services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: mensagens-db
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: mensagens
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - o_o_mensagens-network

  # Backend API
  backend:
    build:
      context: ./mensagens-backend
      dockerfile: Dockerfile
    container_name: mensagens-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGO_URI: mongodb://mongodb:27017/mensagens
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGIN: https://oo.infinityforge.com.br
      LOG_LEVEL: info
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    networks:
      - o_o_mensagens-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`oo.infinityforge.com.br`) && PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend.loadbalancer.server.port=3000"
      - "traefik.docker.network=o_o_o_o_mensagens-network"

  # Frontend
  frontend:
    build:
      context: ./mensagens-frontend
      dockerfile: Dockerfile
    container_name: mensagens-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: https://oo.infinityforge.com.br
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - o_o_mensagens-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`oo.infinityforge.com.br`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
      - "traefik.docker.network=o_o_o_o_mensagens-network"

volumes:
  mongodb_data:

networks:
  o_o_mensagens-network:
    driver: bridge