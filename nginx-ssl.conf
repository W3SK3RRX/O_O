# Proxy HTTP → HTTPS (se usar Let's Encrypt)
server {
    listen 80;
    server_name o_o.infinyforge.com.br;
    return 301 https://$server_name$request_uri;
}

# HTTPS → Docker
server {
    listen 443 ssl http2;
    server_name o_o.infinyforge.com.br;

    ssl_certificate /etc/letsencrypt/live/o_o.infinyforge.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/o_o.infinyforge.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
